# Publish to npm on every version tag (v*), with provenance.
# The test suite gates the publish; provenance attestation links the published
# tarball back to this repository and workflow run.
#
# Required repository secret:
#   NPM_TOKEN — npm automation token with publish rights to @recensa
name: npm publish

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # provenance attestation

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Test
        run: node --test

      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
